name: Build and test keras-mdn-layer

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12', '3.13']
        tf-version: ['2.15.1', '2.16.2', '2.18.1', '2.20.0']
        include:
          - tf-version: '2.15.1'
            tfp-version: '0.23.0'
            tf-keras-version: '2.15.1'
          - tf-version: '2.16.2'
            tfp-version: '0.24.0'
            tf-keras-version: '2.16.0'
          - tf-version: '2.18.1'
            tfp-version: '0.25.0'
            tf-keras-version: ''
          - tf-version: '2.20.0'
            tfp-version: '0.25.0'
            tf-keras-version: ''
        exclude:
          # TF 2.15 only supports Python 3.11; no wheels for 3.12+
          - tf-version: '2.15.1'
            python-version: '3.12'
          - tf-version: '2.15.1'
            python-version: '3.13'
          # TF 2.15 on macOS: supposed to use tensorflow-macos on aarch64 in this era, too hard to deal with.
          - tf-version: '2.15.1'
            platform: macos-latest
          # TF 2.16 does not support Python 3.13
          - tf-version: '2.16.2'
            python-version: '3.13'
          # TF 2.18 does not support Python 3.13
          - tf-version: '2.18.1'
            python-version: '3.13'
          # Windows: TF <2.20 installs via tensorflow-intel which breaks `from tensorflow import keras`
          - tf-version: '2.15.1'
            platform: windows-latest
          - tf-version: '2.16.2'
            platform: windows-latest
          - tf-version: '2.18.1'
            platform: windows-latest

    runs-on: ${{ matrix.platform }}
    name: "${{ matrix.platform }} / py${{ matrix.python-version }} / TF${{ matrix.tf-version }} / TFP${{ matrix.tfp-version }}"

    steps:
    - uses: actions/checkout@v4
    - name: Install poetry
      run: pipx install poetry
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'poetry'
    - name: Install dependencies
      run: |
        poetry install --no-root
        poetry run pip install tensorflow==${{ matrix.tf-version }} tensorflow-probability==${{ matrix.tfp-version }}
    - name: Install tf-keras (legacy TF only)
      if: matrix.tf-keras-version != ''
      run: |
        poetry run pip install tf-keras==${{ matrix.tf-keras-version }}
    - name: Install project
      run: |
        poetry install --only-root
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        poetry run flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        poetry run flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Run tests
      run: |
        poetry run coverage run --source=keras_mdn_layer -m pytest

  coverage:
    needs: test
    runs-on: ubuntu-latest
    name: "Upload coverage"
    steps:
    - uses: actions/checkout@v4
    - name: Install poetry
      run: pipx install poetry
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'poetry'
    - name: Install dependencies
      run: |
        poetry install --no-root
        poetry run pip install tensorflow==2.18.0 tensorflow-probability==0.25.0
        poetry install --only-root
    - name: Run tests with coverage
      run: |
        poetry run coverage run --source=keras_mdn_layer -m pytest
    - name: Upload coverage
      run: poetry run coveralls
      env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: refresh coverage badge
      uses: fjogeleit/http-request-action@v1
      with:
        url: https://camo.githubusercontent.com/2cd3e1ce343708e82b3b0423f4b53355b1c10d981934b0f8e6e81fdaa8f536dc/68747470733a2f2f636f766572616c6c732e696f2f7265706f732f6769746875622f63706d70657263757373696f6e2f6b657261732d6d646e2d6c617965722f62616467652e7376673f6272616e63683d6d6173746572
        method: PURGE
